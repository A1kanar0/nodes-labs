# fly.toml app configuration file generated for lab05-shao on 2026-05-09T00:29:27+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'lab05-shao'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[http_service.checks]]
   grace_period = "10s"
   interval = "15s"
   timeout = "2s"
   method = "GET"
   path = "/health"

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
